<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Book Your Free Class | CKO Kickboxing Emerson</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=League+Spartan:wght@600;700;800&family=Open+Sans:wght@400;500;600&display=swap" rel="stylesheet">

  <link rel="icon" type="image/png" sizes="32x32" href="images/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="images/favicon-16x16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="images/apple-touch-icon.png">

  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Open Sans', sans-serif;
      background: #0f0f1a;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .landing-header {
      text-align: center;
      padding: 40px 20px 20px;
      max-width: 600px;
    }
    .landing-logo {
      width: 140px;
      margin-bottom: 20px;
    }
    .landing-header h1 {
      font-family: 'League Spartan', sans-serif;
      font-size: clamp(1.6rem, 5vw, 2.2rem);
      font-weight: 800;
      text-transform: uppercase;
      line-height: 1.2;
      margin-bottom: 10px;
    }
    .landing-header h1 span {
      color: #C8A000;
    }
    .landing-header p {
      font-size: 0.95rem;
      color: #aaa;
      line-height: 1.5;
    }
    .landing-badges {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-top: 16px;
      flex-wrap: wrap;
    }
    .landing-badge {
      font-family: 'League Spartan', sans-serif;
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #C8A000;
      background: rgba(200, 160, 0, 0.1);
      border: 1px solid rgba(200, 160, 0, 0.25);
      padding: 6px 14px;
      border-radius: 50px;
    }
    .landing-calendar {
      width: 100%;
      max-width: 700px;
      flex: 1;
      padding: 10px 20px 40px;
    }
    .landing-calendar iframe {
      width: 100%;
      height: 700px;
      border: none;
      border-radius: 12px;
      background: #fff;
    }
    @media (max-width: 600px) {
      .landing-header { padding: 30px 16px 16px; }
      .landing-logo { width: 110px; }
      .landing-calendar iframe { height: 600px; }
    }
  </style>
</head>
<body>

  <div class="landing-header">
    <img src="images/cko-logo.webp" alt="CKO Kickboxing Emerson" class="landing-logo">
    <h1>Book Your <span>Free Class</span></h1>
    <p>Pick a time that works for you — show up, throw punches, and see why we're Emerson's top-rated gym.</p>
    <div class="landing-badges">
      <span class="landing-badge">✓ No commitment</span>
      <span class="landing-badge">✓ All levels welcome</span>
      <span class="landing-badge">★ 4.9 on Google</span>
    </div>
  </div>

  <div class="landing-calendar">
    <iframe src="https://api.leadconnectorhq.com/widget/booking/sJnkTvznBaX2tSkwm3Dv" title="Book a free class at CKO Kickboxing Emerson" loading="lazy"></iframe>
  </div>

</body>
</html>
